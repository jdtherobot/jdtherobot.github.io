<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>JD Britt</title>
    <!--
      Single-Page-App fallback for GitHub Pages (rafgraph/spa-github-pages).
      Redirects a deep link (e.g. /challenges/foo) to /?/challenges/foo so
      index.html can restore the real path for react-router. Apex domain →
      pathSegmentsToKeep = 0.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
